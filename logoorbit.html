<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ẍ — orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { display: block; cursor: pointer; }
        #hint {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            color: rgba(0,212,255,0.28); font-family: Inter, sans-serif; font-size: 11px;
            letter-spacing: 0.14em; text-transform: uppercase; pointer-events: none;
            transition: opacity 0.8s;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to replay</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;

// ── Timing ────────────────────────────────────────────────────────────
const T_ORBIT  = 3600;
const T_SETTLE = 1100;
const T_TEXT   = 2000;   // particles fly in and form text
const T_REST   = 2600;
const T_LOOP   = T_ORBIT + T_SETTLE + T_TEXT + T_REST;

// ── Easing ────────────────────────────────────────────────────────────
const easeInOut   = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const easeOut3    = t => 1 - Math.pow(1-t, 3);
const easeOut4    = t => 1 - Math.pow(1-t, 4);
const easeOutBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };

// ── Canvas resize ─────────────────────────────────────────────────────
let particles = null;
function resize() {
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    particles = null;
}
resize();
window.addEventListener('resize', resize);

// ── Build text particles (called once per loop, after fonts load) ──────
function buildParticles(CX, CY, FS) {
    const TEXT_FS = FS * 0.38;
    const TEXT_Y  = CY + FS * 0.85;    // baseline centre below the x

    // Render text onto a small offscreen canvas to sample pixel positions
    const OW = Math.ceil(TEXT_FS * 10);
    const OH = Math.ceil(TEXT_FS * 1.8);
    const oc  = document.createElement('canvas');
    oc.width  = OW;
    oc.height = OH;
    const ox = oc.getContext('2d');
    ox.font         = `italic 600 ${TEXT_FS}px 'Cormorant Garamond', serif`;
    ox.textAlign    = 'center';
    ox.textBaseline = 'middle';
    ox.fillStyle    = '#ffffff';
    ox.fillText('x double dot', OW / 2, OH / 2);

    const data = ox.getImageData(0, 0, OW, OH).data;
    const step = Math.max(3, Math.round(dpr * 2.2));
    const pts  = [];

    for (let y = 0; y < OH; y += step) {
        for (let x = 0; x < OW; x += step) {
            if (data[(y * OW + x) * 4 + 3] > 80) {
                pts.push({
                    tx: CX + (x - OW / 2),
                    ty: TEXT_Y + (y - OH / 2),
                });
            }
        }
    }

    // Shuffle
    for (let i = pts.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [pts[i], pts[j]] = [pts[j], pts[i]];
    }

    const MAX = 800;
    const out  = pts.slice(0, MAX);

    // Start positions: spray from the two settled dot positions
    const sep  = 0;   // will be overwritten below; passing dots separately
    return out;       // caller assigns sx/sy per particle
}

// ── Trail history ─────────────────────────────────────────────────────
const TRAIL = 26;
const hist  = [[], []];

// ── Clock ─────────────────────────────────────────────────────────────
let epoch = null;
function restart() {
    hist[0].length = hist[1].length = 0;
    particles = null;
    epoch = null;
}
canvas.addEventListener('click', restart);

// ── Glow dot ──────────────────────────────────────────────────────────
function dot(x, y, r, alpha) {
    if (alpha < 0.005 || r <= 0) return;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 7);
    g.addColorStop(0,    `rgba(0,212,255,${alpha * 0.55})`);
    g.addColorStop(0.35, `rgba(0,212,255,${alpha * 0.18})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r * 7, 0, Math.PI * 2); ctx.fill();

    const g2 = ctx.createRadialGradient(x, y, 0, x, y, r * 2.5);
    g2.addColorStop(0, `rgba(200,245,255,${alpha * 0.95})`);
    g2.addColorStop(1, `rgba(0,212,255,${alpha * 0.2})`);
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

// ── Main frame ────────────────────────────────────────────────────────
function frame(ts) {
    requestAnimationFrame(frame);
    if (!epoch) epoch = ts;

    const loopT = (ts - epoch) % T_LOOP;
    if (loopT < 60) { hist[0].length = hist[1].length = 0; particles = null; }

    const W  = canvas.width;
    const H  = canvas.height;
    const CX = W * 0.5;
    const CY = H * 0.46;    // logo sits in upper half, text appears below

    // ── Dimensions ──
    const FS = Math.min(W, H) * 0.30;
    ctx.font         = `italic 600 ${FS}px 'Cormorant Garamond', serif`;
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign    = 'center';
    const m      = ctx.measureText('x');
    const ascent = (m.actualBoundingBoxAscent > 0 ? m.actualBoundingBoxAscent : FS * 0.52);
    const sep    = m.width * 0.215;
    const dotY   = CY - ascent - FS * 0.065;
    const DOT_R  = FS * 0.040;

    const TARGET = [
        { x: CX - sep, y: dotY },
        { x: CX + sep, y: dotY },
    ];

    // ── Orbit ──
    const orbitP = Math.min(loopT / T_ORBIT, 1.0);
    const R0     = Math.min(W, H) * 0.28;
    const R1     = Math.min(W, H) * 0.082;
    const R      = R0 - (R0 - R1) * easeInOut(orbitP);
    const spd    = 1 - easeInOut(orbitP) * 0.5;
    const theta  = orbitP * Math.PI * 3.6 * spd;
    const a1     = -Math.PI * 0.5 + theta;
    const a2     = a1 + Math.PI * 0.9;
    const oPos   = a => ({ x: CX + Math.cos(a) * R, y: CY + Math.sin(a) * R });
    const P1o    = oPos(a1);
    const P2o    = oPos(a2);

    // ── Settle ──
    const settleRaw = loopT > T_ORBIT ? Math.min((loopT - T_ORBIT) / T_SETTLE, 1.0) : 0;
    const settleE   = settleRaw > 0 ? easeOutBack(settleRaw) : 0;
    const lp = (a, b, t) => a + (b - a) * t;
    const P1 = { x: lp(P1o.x, TARGET[0].x, settleE), y: lp(P1o.y, TARGET[0].y, settleE) };
    const P2 = { x: lp(P2o.x, TARGET[1].x, settleE), y: lp(P2o.y, TARGET[1].y, settleE) };

    const orbiting = settleRaw === 0;

    // ── Text phase ──
    const textStart = T_ORBIT + T_SETTLE;
    const textRaw   = loopT > textStart ? Math.min((loopT - textStart) / T_TEXT, 1.0) : 0;

    // Initialise particles on first text frame — font guaranteed loaded by now
    if (textRaw > 0 && !particles) {
        const pts = buildParticles(CX, CY, FS);
        const spread = FS * 0.06;
        // Sort pts left-to-right for sweep effect, add sx/sy/delay
        pts.sort((a, b) => a.tx - b.tx);
        const n = pts.length;
        particles = pts.map((p, i) => {
            const src = i % 2 === 0 ? TARGET[0] : TARGET[1];
            return {
                ...p,
                sx: src.x + (Math.random() - 0.5) * spread,
                sy: src.y + (Math.random() - 0.5) * spread,
                delay: (i / n) * 0.55 + Math.random() * 0.08,
            };
        });
    }

    // ── Clear & background ──
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    // Ambient
    const ambA = 0.022 + 0.036 * easeOut3(settleRaw) + 0.018 * textRaw;
    const amb  = ctx.createRadialGradient(CX, CY, 0, CX, CY, FS * 1.5);
    amb.addColorStop(0, `rgba(0,160,255,${ambA})`);
    amb.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = amb;
    ctx.fillRect(0, 0, W, H);

    // ── Orbit ring ──
    if (orbiting) {
        const ringA = 0.07 * Math.min(1, loopT / 500) * (1 - Math.pow(orbitP, 4));
        if (ringA > 0.003) {
            ctx.save();
            ctx.strokeStyle = `rgba(0,212,255,${ringA})`;
            ctx.lineWidth   = 0.5 * dpr;
            ctx.setLineDash([5 * dpr, 10 * dpr]);
            ctx.beginPath();
            ctx.arc(CX, CY, R, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    // ── Trails ──
    hist[0].push({ ...P1 });
    hist[1].push({ ...P2 });
    if (hist[0].length > TRAIL) { hist[0].shift(); hist[1].shift(); }
    if (orbiting) {
        [hist[0], hist[1]].forEach(h => {
            h.forEach((p, i) => {
                dot(p.x, p.y, DOT_R * (i / h.length) * 0.65, (i / h.length) * 0.09);
            });
        });
    }

    // ── The x ──
    const xA = Math.min(loopT / 700, 1.0);
    ctx.save();
    ctx.font         = `italic 600 ${FS}px 'Cormorant Garamond', serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle    = `rgba(0,212,255,${xA * 0.82})`;
    ctx.fillText('x', CX, CY);
    ctx.restore();

    // ── Diaeresis dots ──
    const dotA       = Math.min(loopT / 350, 1.0);
    const snapPulse  = settleRaw >= 1 && textRaw === 0
        ? 1 + 0.18 * Math.exp(-6 * (loopT - T_ORBIT - T_SETTLE) / T_TEXT)
        : 1;
    dot(P1.x, P1.y, DOT_R * snapPulse, dotA);
    dot(P2.x, P2.y, DOT_R * snapPulse, dotA);

    // Snap flash
    if (settleRaw > 0.62 && settleRaw < 1.0) {
        ctx.save();
        ctx.strokeStyle = `rgba(0,212,255,${(1 - settleRaw) * 0.3})`;
        ctx.lineWidth   = 0.5 * dpr;
        ctx.beginPath();
        ctx.moveTo(P1.x, P1.y);
        ctx.lineTo(P2.x, P2.y);
        ctx.stroke();
        ctx.restore();
    }

    // ── Text particles ──
    if (particles && textRaw > 0) {
        // Use additive blending so overlapping particles glow brighter
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const pr = DOT_R * 0.30;

        particles.forEach(p => {
            const local = Math.max(0, (textRaw - p.delay) / (1.0 - p.delay * 0.5));
            if (local <= 0) return;
            const e = easeOut4(Math.min(local, 1));
            const x = p.sx + (p.tx - p.sx) * e;
            const y = p.sy + (p.ty - p.sy) * e;
            const a = easeOut3(Math.min(local, 1)) * 0.55;

            ctx.fillStyle = `rgba(0,212,255,${a})`;
            ctx.beginPath();
            ctx.arc(x, y, pr * 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = `rgba(200,240,255,${a * 0.7})`;
            ctx.beginPath();
            ctx.arc(x, y, pr, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.restore();
    }
}

// ── Start once font is ready ───────────────────────────────────────────
document.fonts.ready.then(() => {
    requestAnimationFrame(frame);
});

setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
}, T_LOOP + 800);
</script>
</body>
</html>
