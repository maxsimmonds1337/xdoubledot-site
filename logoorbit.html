<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ẍ — orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { display: block; cursor: pointer; }
        #hint {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            color: rgba(0,212,255,0.28); font-family: Inter, sans-serif; font-size: 11px;
            letter-spacing: 0.14em; text-transform: uppercase; pointer-events: none;
            transition: opacity 0.8s;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to replay</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;

// ── Timing (ms) ───────────────────────────────────────────────────────
const T_ORBIT  = 3600;
const T_SETTLE = 1100;
const T_TEXT   = 1900;   // particles assemble into name
const T_REST   = 2600;
const T_LOOP   = T_ORBIT + T_SETTLE + T_TEXT + T_REST;

// ── Easing ────────────────────────────────────────────────────────────
const easeInOut   = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const easeOut3    = t => 1 - Math.pow(1-t, 3);
const easeOut4    = t => 1 - Math.pow(1-t, 4);
const easeOutBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };

// ── Resize ────────────────────────────────────────────────────────────
function resize() {
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    particles = null;   // rebuild on resize
}
resize();
window.addEventListener('resize', resize);

// ── Particle state ────────────────────────────────────────────────────
// Each particle: { tx, ty, sx, sy, delay, col }
// tx/ty = target (text pixel), sx/sy = start (near settled dots)
let particles = null;

function buildParticles(CX, CY, FS, dot1, dot2) {
    const TEXT    = 'x double dot';
    const TEXT_FS = FS * 0.40;
    // Position text centre below the x character
    const textCY  = CY + FS * 0.78;

    // ── Offscreen render ──
    // Over-size width so long text never clips
    const OW = Math.round(Math.min(canvas.width, FS * 4.5));
    const OH = Math.round(TEXT_FS * 2.2);
    const oc = document.createElement('canvas');
    oc.width = OW; oc.height = OH;
    const octx = oc.getContext('2d');
    octx.font = `italic 600 ${TEXT_FS}px 'Cormorant Garamond', serif`;
    octx.fillStyle = '#fff';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.fillText(TEXT, OW/2, OH/2);

    const imageData = octx.getImageData(0, 0, OW, OH).data;

    // ── Sample pixels ──
    const step = Math.max(3, Math.round(4 * dpr * 0.5));   // ~4 css-px apart
    const targets = [];
    for (let y = 0; y < OH; y += step) {
        for (let x = 0; x < OW; x += step) {
            if (imageData[(y * OW + x) * 4 + 3] > 90) {
                targets.push({
                    tx: CX + (x - OW / 2),
                    ty: textCY + (y - OH / 2),
                });
            }
        }
    }

    // Shuffle
    for (let i = targets.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [targets[i], targets[j]] = [targets[j], targets[i]];
    }

    // Cap at a comfortable count
    const MAX = 700;
    const pts = targets.slice(0, MAX);

    // Assign each particle a start position (near one of the two settled dots)
    // and a staggered delay based on x-position so it sweeps left→right
    const xMin = Math.min(...pts.map(p => p.tx));
    const xMax = Math.max(...pts.map(p => p.tx));
    const xRange = xMax - xMin || 1;

    return pts.map((p, i) => {
        const src = Math.random() < 0.5 ? dot1 : dot2;
        const spread = FS * 0.04;
        return {
            tx: p.tx,
            ty: p.ty,
            sx: src.x + (Math.random() - 0.5) * spread,
            sy: src.y + (Math.random() - 0.5) * spread,
            // delay 0..0.55 sweeping left to right with slight noise
            delay: ((p.tx - xMin) / xRange) * 0.55 + Math.random() * 0.12,
        };
    });
}

// ── Trail history ─────────────────────────────────────────────────────
const TRAIL = 26;
const hist  = [[], []];

// ── Clock ─────────────────────────────────────────────────────────────
let epoch = null;

function restart() {
    hist[0].length = hist[1].length = 0;
    particles = null;
    epoch = null;
}
canvas.addEventListener('click', restart);

// ── Frame ─────────────────────────────────────────────────────────────
function frame(ts) {
    requestAnimationFrame(frame);

    if (!epoch) epoch = ts;
    const loopT = (ts - epoch) % T_LOOP;
    if (loopT < 60) { hist[0].length = hist[1].length = 0; particles = null; }

    const W  = canvas.width,  H = canvas.height;
    const CX = W * 0.5,      CY = H * 0.44;   // shifted up to make room for text

    // ── Metrics ──
    const FS = Math.min(W, H) * 0.30;
    ctx.font = `italic 600 ${FS}px 'Cormorant Garamond', serif`;
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign    = 'center';
    const m      = ctx.measureText('x');
    const ascent = m.actualBoundingBoxAscent || FS * 0.52;

    const sep    = m.width * 0.215;
    const dotY   = CY - ascent - FS * 0.065;
    const TARGET = [{ x: CX - sep, y: dotY }, { x: CX + sep, y: dotY }];
    const DOT_R  = FS * 0.040;

    // ── Orbit ──
    const orbitP = Math.min(loopT / T_ORBIT, 1.0);
    const R0 = Math.min(W, H) * 0.28;
    const R1 = Math.min(W, H) * 0.082;
    const R  = R0 - (R0 - R1) * easeInOut(orbitP);
    const spd = 1 - easeInOut(orbitP) * 0.5;
    const theta = orbitP * Math.PI * 3.6 * spd;
    const a1 = -Math.PI * 0.5 + theta;
    const a2 = a1 + Math.PI * 0.9;
    const oPos = a => ({ x: CX + Math.cos(a)*R, y: CY + Math.sin(a)*R });
    const P1o  = oPos(a1), P2o = oPos(a2);

    // ── Settle ──
    const settleRaw = loopT > T_ORBIT ? Math.min((loopT - T_ORBIT) / T_SETTLE, 1.0) : 0;
    const settleE   = settleRaw > 0 ? easeOutBack(settleRaw) : 0;
    const lerp = (a, b, t) => a + (b - a) * t;
    const P1 = { x: lerp(P1o.x, TARGET[0].x, settleE), y: lerp(P1o.y, TARGET[0].y, settleE) };
    const P2 = { x: lerp(P2o.x, TARGET[1].x, settleE), y: lerp(P2o.y, TARGET[1].y, settleE) };

    const orbiting = settleRaw === 0;
    const settled  = settleRaw >= 1;

    // ── Text phase ──
    const textT0 = T_ORBIT + T_SETTLE;
    const textRaw = loopT > textT0 ? Math.min((loopT - textT0) / T_TEXT, 1.0) : 0;

    // Build particles once when text phase begins
    if (textRaw > 0 && !particles) {
        particles = buildParticles(CX, CY, FS, TARGET[0], TARGET[1]);
    }

    // ── Clear ──
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

    // Ambient halo, expands as text appears
    const ambScale = 1.4 + textRaw * 0.6;
    const ambA = 0.022 + 0.038 * easeOut3(settleRaw) + 0.020 * textRaw;
    const amb = ctx.createRadialGradient(CX, CY, 0, CX, CY, FS * ambScale);
    amb.addColorStop(0, `rgba(0,160,255,${ambA})`);
    amb.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = amb; ctx.fillRect(0, 0, W, H);

    // ── Orbit ring ──
    const ringA = orbiting ? 0.07 * Math.min(1, loopT/500) * (1 - Math.pow(orbitP, 4)) : 0;
    if (ringA > 0.003) {
        ctx.save();
        ctx.strokeStyle = `rgba(0,212,255,${ringA})`;
        ctx.lineWidth = 0.5 * dpr;
        ctx.setLineDash([5*dpr, 10*dpr]);
        ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
    }

    // ── Trails ──
    hist[0].push({...P1}); hist[1].push({...P2});
    if (hist[0].length > TRAIL) { hist[0].shift(); hist[1].shift(); }
    if (orbiting) {
        [hist[0], hist[1]].forEach(h => h.forEach((p, i) => {
            dot(p.x, p.y, DOT_R * (i/h.length) * 0.65, (i/h.length) * 0.09);
        }));
    }

    // ── x character ──
    const xA = Math.min(loopT / 700, 1.0);
    ctx.save();
    ctx.font = `italic 600 ${FS}px 'Cormorant Garamond', serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = `rgba(0,212,255,${xA * 0.82})`;
    ctx.fillText('x', CX, CY);
    ctx.restore();

    // ── Diaeresis dots ──
    const dotAlpha = Math.min(loopT / 350, 1.0);
    const snapPulse = settled && textRaw === 0
        ? 1 + 0.18 * Math.exp(-6 * (loopT - T_ORBIT - T_SETTLE) / T_TEXT)
        : 1;
    dot(P1.x, P1.y, DOT_R * snapPulse, dotAlpha);
    dot(P2.x, P2.y, DOT_R * snapPulse, dotAlpha);

    // Snap connection flash
    if (settleRaw > 0.6 && settleRaw < 1) {
        const fa = (1 - settleRaw) * 0.32;
        ctx.save();
        ctx.strokeStyle = `rgba(0,212,255,${fa})`;
        ctx.lineWidth = 0.5 * dpr;
        ctx.beginPath(); ctx.moveTo(P1.x, P1.y); ctx.lineTo(P2.x, P2.y); ctx.stroke();
        ctx.restore();
    }

    // ── Text particles ──
    if (particles && textRaw > 0) {
        particles.forEach(p => {
            // Each particle has its own delayed progress
            const local = Math.max(0, Math.min(1, (textRaw - p.delay) / (1 - p.delay * 0.4)));
            if (local <= 0) return;
            const e = easeOut4(local);
            const x = p.sx + (p.tx - p.sx) * e;
            const y = p.sy + (p.ty - p.sy) * e;
            const a = easeOut3(local) * 0.82;

            // Tiny glowing particle
            const pr = DOT_R * 0.28;
            const g = ctx.createRadialGradient(x, y, 0, x, y, pr * 5);
            g.addColorStop(0,   `rgba(220,245,255,${a})`);
            g.addColorStop(0.3, `rgba(0,212,255,${a * 0.7})`);
            g.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(x, y, pr * 5, 0, Math.PI * 2); ctx.fill();
        });
    }
}

// ── Glow dot ──────────────────────────────────────────────────────────
function dot(x, y, r, alpha) {
    if (alpha < 0.005) return;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r*7);
    g.addColorStop(0,    `rgba(0,212,255,${alpha*0.55})`);
    g.addColorStop(0.35, `rgba(0,212,255,${alpha*0.18})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r*7, 0, Math.PI*2); ctx.fill();

    const g2 = ctx.createRadialGradient(x, y, 0, x, y, r*2.5);
    g2.addColorStop(0, `rgba(200,245,255,${alpha*0.95})`);
    g2.addColorStop(1, `rgba(0,212,255,${alpha*0.2})`);
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(x, y, r*2.5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

// ── Start ─────────────────────────────────────────────────────────────
document.fonts.ready.then(() => requestAnimationFrame(frame));

setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
}, T_LOOP + 800);
</script>
</body>
</html>
